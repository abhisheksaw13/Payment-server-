<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>💳 Cashfree Payment Gateway</h1>
    </header>

    <main>
      <section class="card text-center" id="successSection">
        <div class="success-icon">✅</div>
        <h2>Payment Successful!</h2>
        <p class="subtitle">Thank you. Your payment has been processed.</p>
        <div id="orderDetails" class="order-details"></div>
        <div id="statusLoader" class="status-loader">
          <span class="spinner"></span> Verifying payment…
        </div>
        <a href="/" class="btn btn-primary mt-2">Make Another Payment</a>
      </section>
    </main>

    <footer class="page-footer">
      <p>🔒 Your payment is secured by 256-bit SSL encryption</p>
    </footer>
  </div>

  <script src="/js/success.js"></script>
</body>
</html>
